<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Training Control System</title>
<link rel="stylesheet" href="/style/style.css">   
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<img src="img/1.png" class="bgImg" alt="Background Image">
<body>
    <div id="authContainer">
        <div id="loginContent">
            <img src="img/logo.png" alt="Company Logo">
            
            <form action="" id="authForm">
                <h1 id="authFormTitle">Login to your account</h1>
                
                <div class="authFormItem">
                    <label for="email">Email: </label>
                    <input type="email" id="email" placeholder="Enter your email..." required>
                </div>
                
                <div class="authFormItem">
                    <label for="password">Password: </label>
                    <input type="password" id="password" placeholder="Enter your password..." required>
                </div>
                
                <input type="submit" id="submitAuthForm" value="Access" class="light-button">
            </form>

            <p id="register" class="authOption">Don't have an account?
                <button id="createAccount">Create new account</button>
            </p>

            <p id="reset" class="authOption">Forgot your password?
                <button id="resetPassword">Reset password</button>
            </p>

            <p id="access" class="startHidden authOption">Already have an account?
                <button id="accessAccount">Sign in</button>
            </p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    
    <script src="firebase-config.js"></script>
    <script src="utils.js"></script>
    <script src="auth.js"></script>
</body>
</html>
