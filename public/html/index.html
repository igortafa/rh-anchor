<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Management Dashboard | Home</title>
  <link rel="stylesheet" href="/style/style.css">   
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <header>
        <h5>Logo Space</h5>
        <ul id="nav">
            <li><a href="index.html" class="activePage">Home</a></li>
        </ul> 
        <button class="light-button" id="exitAccountButton">Logout</button>
    </header>

    <main>
        <h1 class="welcome" id="configTitle">Welcome, User</h1>
        
        <div id="config">
            <div id="gridOptions">
                <div class="configOption" id="setoresButton">
                    <div class="configIcon">
                        <i class="fa-solid fa-building-user"></i>
                    </div>
                    <h5>Sectors</h5>
                </div>

                <div class="configOption" id="colaboradoresButton">
                    <div class="configIcon">
                        <i class="fa-solid fa-people-group"></i>
                    </div>
                    <h5>Employees</h5>
                </div>

                <div class="configOption" onclick="window.location.href = 'training-matrix.html'">
                    <div class="configIcon">
                        <i class="fa-solid fa-book"></i>
                    </div>
                    <h5>Trainings</h5>
                </div>

                <div class="configOption" style="opacity: .7;">
                    <div class="configIcon">
                        <i class="fa-solid fa-table-cells"></i>
                    </div>
                    <h5>Matrix View</h5>
                </div>

                <div class="configOption" style="opacity: .7;">
                    <div class="configIcon">
                        <i class="fa-solid fa-file-export"></i>
                    </div>
                    <h5>Reports</h5>
                </div>

                <div class="configOption" style="opacity: .7;">
                    <div class="configIcon">
                        <i class="fa-solid fa-paintbrush"></i>
                    </div>
                    <h5>Appearance</h5>
                </div>
            </div>
        </div>

        <div id="setores" style="display:none">
            <div class="titleAndSubtitle">
                <h1>
                    <span class="redirectToOptions">Home</span>
                    <span style="font-size: 1.4rem; margin: 10px; opacity: .7;">></span>
                    Sectors
                </h1>
            </div>
            
            <div id="kanbanSetores">
                <div id="kanbanColumns">
                    </div>
                <button class="kanbanAddColumn" id="kanbanAddColumn">
                    <i class="fa-solid fa-plus"></i> Add Sector
                </button>
            </div>

            <div class="cardMenu">
                <button class="excluirCartaoButton">Delete Card</button>
            </div>
        </div>
    </main>
     
    <div class="modalContainer" id="alert"></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script src="/js/firebase-config.js"></script>
    <script src="/js/app-core.js"></script> <script src="/js/general.js"></script>
    <script src="/js/kanban.js"></script>
    <script src="/js/index-script.js"></script>
</body>
</html>
